{% extends "base.html" %}

{% block title %}Upload Badge Template{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <h2 class="mb-0">
            <i class="bi bi-file-earmark-image"></i> Upload Badge Template
        </h2>
        <a href="{{ url_for('badge_generator') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Badge Generator
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Template Name</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. Speaker Badge, Attendee Badge">
            </div>
            <div class="mb-3">
                <label class="form-label">Template Image (PNG/JPG)</label>
                <input type="file" name="template_file" class="form-control" accept=".png,.jpg,.jpeg" required>
                <div class="form-text">
                    Use a high-resolution image for best print quality.
                </div>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-upload"></i> Upload Template
            </button>
        </form>
    </div>
</div>
{% endblock %}
